<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reservas - Match Futbol</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <div class="sidebar">
    <h2>⚽ Match Futbol</h2>
    <a href="../index.html">🏠 Inicio</a>
    <a href="clientes.html">👥 Clientes</a>
    <a href="reservas.html">📅 Reservas</a>
  </div>

  <div class="contenido">
    <h1>📅 Reservas</h1>

    <!-- Mensaje de confirmacion -->
    <div class="mensaje-ok" id="mensajeOk">✅ Reserva guardada con éxito.</div>

    <!-- Formulario nueva reserva -->
    <h2>Nueva reserva</h2>
    <form id="formReserva">

      <label>Cliente *</label>
      <select id="clienteSelect">
        <option value="">-- Seleccioná un cliente --</option>
      </select>

      <label>Cancha *</label>
      <select id="cancha">
        <option value="1">Cancha 1</option>
        <option value="2">Cancha 2</option>
        <option value="3">Cancha 3</option>
        <option value="4">Cancha 4</option>
      </select>

      <label>Fecha *</label>
      <input type="date" id="fecha">

      <label>Hora *</label>
      <select id="hora">
        <option value="08:00">08:00</option>
        <option value="09:00">09:00</option>
        <option value="10:00">10:00</option>
        <option value="11:00">11:00</option>
        <option value="12:00">12:00</option>
        <option value="13:00">13:00</option>
        <option value="14:00">14:00</option>
        <option value="15:00">15:00</option>
        <option value="16:00">16:00</option>
        <option value="17:00">17:00</option>
        <option value="18:00">18:00</option>
        <option value="19:00">19:00</option>
        <option value="20:00">20:00</option>
        <option value="21:00">21:00</option>
        <option value="22:00">22:00</option>
        <option value="23:00">23:00</option>
      </select>

      <label>Seña pagada ($)</label>
      <input type="number" id="sena" placeholder="0" min="0">

      <label>Estado del pago</label>
      <select id="estadoPago">
        <option value="Seña pagada">Seña pagada</option>
        <option value="Pagada completa">Pagada completa</option>
        <option value="Sin pago">Sin pago</option>
      </select>

      <button type="button" onclick="guardarReserva()">Guardar reserva</button>

    </form>

    <!-- Tabla de reservas -->
    <h2>Lista de reservas</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>Cancha</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Seña</th>
          <th>Pago</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaReservas">
        <tr><td colspan="9">No hay reservas registradas.</td></tr>
      </tbody>
    </table>

  </div>

  <script>

    // Cargar clientes en el select al abrir la pagina
    function cargarClientes() {
      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      var select   = document.getElementById("clienteSelect");

      // Limpiar opciones anteriores (menos la primera)
      select.innerHTML = "<option value=''>-- Seleccioná un cliente --</option>";

      for (var i = 0; i < clientes.length; i++) {
        var opcion = document.createElement("option");
        opcion.value = clientes[i].nombre;
        opcion.textContent = clientes[i].nombre + " - " + clientes[i].telefono;
        select.appendChild(opcion);
      }
    }

    // Guardar una nueva reserva
    function guardarReserva() {
      var cliente    = document.getElementById("clienteSelect").value;
      var cancha     = document.getElementById("cancha").value;
      var fecha      = document.getElementById("fecha").value;
      var hora       = document.getElementById("hora").value;
      var sena       = document.getElementById("sena").value;
      var estadoPago = document.getElementById("estadoPago").value;

      // Validacion basica
      if (cliente == "" || fecha == "") {
        alert("El cliente y la fecha son obligatorios.");
        return;
      }

      // Verificar que no haya otra reserva en la misma cancha, fecha y hora
      var reservas = JSON.parse(localStorage.getItem("reservas")) || [];
      for (var i = 0; i < reservas.length; i++) {
        var r = reservas[i];
        if (r.cancha == cancha && r.fecha == fecha && r.hora == hora && r.estado != "cancelada") {
          alert("⚠️ Ya hay una reserva en la Cancha " + cancha + " el " + fecha + " a las " + hora + "hs.");
          return;
        }
      }

      // Crear objeto reserva
      var nuevaReserva = {
        cliente:    cliente,
        cancha:     cancha,
        fecha:      fecha,
        hora:       hora,
        sena:       sena || "0",
        estadoPago: estadoPago,
        estado:     "activa"
      };

      reservas.push(nuevaReserva);
      localStorage.setItem("reservas", JSON.stringify(reservas));

      // Limpiar formulario
      document.getElementById("clienteSelect").value = "";
      document.getElementById("fecha").value         = "";
      document.getElementById("sena").value          = "";
      document.getElementById("estadoPago").value    = "Seña pagada";

      // Mostrar mensaje
      var msg = document.getElementById("mensajeOk");
      msg.style.display = "block";
      setTimeout(function() { msg.style.display = "none"; }, 2500);

      mostrarReservas();
    }

    // Mostrar reservas en la tabla
    function mostrarReservas() {
      var reservas = JSON.parse(localStorage.getItem("reservas")) || [];
      var tbody    = document.getElementById("tablaReservas");

      if (reservas.length == 0) {
        tbody.innerHTML = "<tr><td colspan='9'>No hay reservas registradas.</td></tr>";
        return;
      }

      var html = "";
      for (var i = 0; i < reservas.length; i++) {
        var r = reservas[i];

        // Color de fila si esta cancelada
        var estilo = r.estado == "cancelada" ? "style='color:gray;text-decoration:line-through'" : "";

        html += "<tr " + estilo + ">";
        html += "<td>" + (i + 1) + "</td>";
        html += "<td>" + r.cliente + "</td>";
        html += "<td>Cancha " + r.cancha + "</td>";
        html += "<td>" + formatearFecha(r.fecha) + "</td>";
        html += "<td>" + r.hora + "hs</td>";
        html += "<td>$" + r.sena + "</td>";
        html += "<td>" + r.estadoPago + "</td>";
        html += "<td>" + r.estado + "</td>";
        html += "<td>";
        if (r.estado != "cancelada") {
          html += "<button class='btn-eliminar' onclick='cancelarReserva(" + i + ")'>Cancelar</button>";
        }
        html += "</td>";
        html += "</tr>";
      }

      tbody.innerHTML = html;
    }

    // Cancelar una reserva
    function cancelarReserva(indice) {
      var confirmar = confirm("¿Cancelar esta reserva?");
      if (!confirmar) return;

      var reservas = JSON.parse(localStorage.getItem("reservas")) || [];
      reservas[indice].estado = "cancelada";
      localStorage.setItem("reservas", JSON.stringify(reservas));

      mostrarReservas();
    }

    // Formatear fecha de YYYY-MM-DD a DD/MM/YYYY
    function formatearFecha(fecha) {
      if (!fecha) return "—";
      var partes = fecha.split("-");
      return partes[2] + "/" + partes[1] + "/" + partes[0];
    }

    // Inicializar pagina
    cargarClientes();
    mostrarReservas();

  </script>

</body>
</html>
